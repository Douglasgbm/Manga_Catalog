<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login ADM - Catálogo de Mangás</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <a href="index.html" target="_self">
        <img src="assets/banners/banner_mix.jpg" alt="Banner do Mangá">
    </a>
</header>
<body>
    <div class="login-container">
        <h2>Acesso Administrativo</h2>
        <form id="login-form">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="erro-login" style="color: red; display: none;">Usuário ou senha incorretos!</p>
        <a href="index.html">Voltar para a loja</a>
    </div>
    <script src="login.js"></script>
</body>
</html>
